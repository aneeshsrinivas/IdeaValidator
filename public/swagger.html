<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Swagger UI</title>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css" />
  <style>
    html { box-sizing: border-box; overflow: -moz-scrollbars-vertical; overflow-y: scroll; }
    *, *:before, *:after { box-sizing: inherit; }
    body { margin:0; background: #fafafa; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
  <script>
  window.onload = function() {
    const spec = {
      openapi: "3.0.0",
      info: { title: "IdeaValidator API", version: "1.0.0" },
      paths: {
        "/api/ideas": {
          get: {
            summary: "Get all ideas",
            responses: { "200": { description: "List of ideas retrieved successfully" } }
          },
          post: {
            summary: "Submit and analyze a new idea",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: { type: "object", properties: { title: { type: "string", example: "Uber for dog walkers" }, description: { type: "string", example: "An app that connects busy professionals with local dog walkers on demand." } }, required: ["title", "description"] }
                }
              }
            },
            responses: {
              "201": { description: "Idea created and analyzed successfully" },
              "400": { description: "Validation error" }
            }
          }
        },
        "/api/ideas/{id}": {
          get: {
            summary: "Get an idea by its UUID",
            parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
            responses: { "200": { description: "Idea retrieved successfully" }, "404": { description: "Idea not found" } }
          },
          delete: {
            summary: "Delete an idea by its UUID",
            parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
            responses: { "200": { description: "Idea deleted successfully" }, "404": { description: "Idea not found" } }
          }
        }
      }
    };
    const ui = SwaggerUIBundle({
      spec: spec,
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [ SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset ],
      layout: "StandaloneLayout"
    });
    window.ui = ui;
  };
  </script>
</body>
</html>
